<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="apple-mobile-web-app-title" content="Budget app" />
        <title>Budget</title>
        <link rel="icon" type="image/x-icon" href="/budget/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/budget/192x192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="152x152"
            href="/budget/192x192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="120x120"
            href="/budget/192x192.png"
        />
        <link rel="apple-touch-startup-image" href="/budget/oioi.png" />
        <link rel="stylesheet" href="assets/css/material-tailwind.css" />
        <link rel="manifest" href="/budget/manifest.json" />
        <script src="assets/js/tw.js"></script>
        <script src="assets/js/ripple.js"></script>
        <script src="assets/js/budget.js"></script>
        <base href="/" />
    </head>

    <body class="bg-slate-50 min-h-screen">
        <main class="mx-auto max-w-md px-4 py-6">
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <span
                            class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-base"
                            >👸</span
                        >
                        <input
                            id="idaIncome"
                            type="number"
                            inputmode="numeric"
                            pattern="[0-9]*"
                            placeholder="Indkomst"
                            class="h-11 w-full rounded-lg border border-slate-200 bg-white pl-10 pr-3 text-right text-base font-medium tabular-nums text-slate-900 placeholder:font-normal placeholder:text-slate-400 outline-none transition focus:border-rose-400 focus:ring-2 focus:ring-rose-100"
                        />
                    </div>
                    <div class="relative">
                        <span
                            class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-base"
                            >🤴</span
                        >
                        <input
                            id="jeppeIncome"
                            type="number"
                            inputmode="numeric"
                            pattern="[0-9]*"
                            placeholder="Indkomst"
                            class="h-11 w-full rounded-lg border border-slate-200 bg-white pl-10 pr-3 text-right text-base font-medium tabular-nums text-slate-900 placeholder:font-normal placeholder:text-slate-400 outline-none transition focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
                        />
                    </div>
                </div>
                <button
                    id="calcButton"
                    disabled
                    class="middle none center h-11 w-full rounded-lg bg-emerald-500 px-6 font-sans text-sm font-semibold text-white shadow-sm shadow-emerald-500/20 transition-all hover:bg-emerald-600 hover:shadow-md hover:shadow-emerald-500/30 focus:opacity-90 active:opacity-90 disabled:pointer-events-none disabled:opacity-40 disabled:shadow-none"
                    data-ripple-light="true"
                >
                    Beregn
                </button>
            </div>

            <section
                class="mt-6 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm"
            >
                <header class="mb-2 flex items-center gap-2">
                    <span class="text-xl leading-none">👸</span>
                    <h2 class="text-base font-semibold text-rose-600">
                        Ida
                    </h2>
                </header>
                <dl id="idaList" class="text-sm"></dl>
            </section>

            <section
                class="mt-3 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm"
            >
                <header class="mb-2 flex items-center gap-2">
                    <span class="text-xl leading-none">🤴</span>
                    <h2 class="text-base font-semibold text-indigo-600">
                        Jeppe
                    </h2>
                </header>
                <dl id="jeppeList" class="text-sm"></dl>
            </section>

            <section
                class="mt-3 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm"
            >
                <div class="flex items-center justify-between">
                    <h2 class="text-base font-semibold text-emerald-600">
                        Samlet forbrug
                    </h2>
                    <span
                        id="totalForbrug"
                        class="font-semibold tabular-nums text-emerald-600 text-lg"
                        >—</span
                    >
                </div>
            </section>

            <button
                id="downloadButton"
                class="hidden middle none center mt-6 h-11 w-full rounded-lg border border-slate-200 bg-white px-6 font-sans text-sm font-medium text-slate-700 shadow-sm transition-all hover:bg-slate-50 focus:opacity-90 active:opacity-90"
                data-ripple-dark="true"
            >
                Hent som billede
            </button>
        </main>

        <script>
            if ("serviceWorker" in navigator) {
                const wasControlled = !!navigator.serviceWorker.controller;
                let refreshing = false;
                navigator.serviceWorker.addEventListener(
                    "controllerchange",
                    () => {
                        if (!wasControlled || refreshing) return;
                        refreshing = true;
                        window.location.reload();
                    },
                );
                navigator.serviceWorker
                    .register("/budget/sw.js")
                    .then((registration) =>
                        console.log(
                            "Service Worker registered with scope:",
                            registration.scope,
                        ),
                    )
                    .catch((error) =>
                        console.error(
                            "Service Worker registration failed:",
                            error,
                        ),
                    );
            }
        </script>
    </body>
</html>
