<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="apple-mobile-web-app-title" content="Budget app" />
        <title>Budget</title>
        <link rel="icon" type="image/x-icon" href="/budget/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/budget/192x192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="152x152"
            href="/budget/192x192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="120x120"
            href="/budget/192x192.png"
        />
        <link rel="apple-touch-startup-image" href="/budget/oioi.png" />
        <link rel="stylesheet" href="assets/css/material-tailwind.css" />
        <link rel="manifest" href="/budget/manifest.json" />
        <script src="assets/js/tw.js"></script>
        <script src="assets/js/ripple.js"></script>
        <script type="module" src="assets/js/budget.js"></script>
        <base href="/" />
    </head>

    <body class="bg-slate-50 min-h-screen">
        <main class="mx-auto max-w-lg px-4 py-6">
            <nav
                id="topNav"
                class="mb-6 hidden grid-cols-2 border-b border-slate-200"
            >
                <button
                    id="tabMain"
                    type="button"
                    class="border-b-2 border-transparent py-3 text-center text-sm font-medium text-slate-500 transition hover:text-slate-900"
                >
                    Budget
                </button>
                <button
                    id="tabConfig"
                    type="button"
                    class="border-b-2 border-transparent py-3 text-center text-sm font-medium text-slate-500 transition hover:text-slate-900"
                >
                    Indstillinger
                </button>
            </nav>

            <section id="welcomeView" class="hidden mt-12">
                <div
                    class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm"
                >
                    <h1 class="text-center text-2xl font-semibold text-slate-900">
                        Budgetfordeler
                    </h1>
                    <p class="mt-2 text-sm text-slate-600">
                        Fordel husstandens fælles udgifter efter indkomst — hver
                        person bidrager forholdsmæssigt.
                    </p>
                    <p class="mt-3 text-xs text-slate-500">
                        Log ind for at synkronisere konfigurationen på tværs af
                        enheder, eller brug appen lokalt på denne enhed.
                    </p>
                    <div class="mt-6 space-y-2">
                        <button
                            id="welcomeSignInButton"
                            type="button"
                            class="h-11 w-full rounded-lg bg-slate-900 px-4 text-sm font-semibold text-white transition hover:bg-slate-800"
                        >
                            Log ind med Google
                        </button>
                        <button
                            id="welcomeLocalButton"
                            type="button"
                            class="h-11 w-full rounded-lg border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
                        >
                            Brug lokalt
                        </button>
                    </div>
                </div>
            </section>

            <section id="mainView" class="hidden">
                <div class="space-y-3">
                    <div id="incomeInputs"></div>
                    <button
                        id="calcButton"
                        disabled
                        class="middle none center h-11 w-full rounded-lg bg-emerald-500 px-6 font-sans text-sm font-semibold text-white shadow-sm shadow-emerald-500/20 transition-all hover:bg-emerald-600 hover:shadow-md hover:shadow-emerald-500/30 focus:opacity-90 active:opacity-90 disabled:pointer-events-none disabled:opacity-40 disabled:shadow-none"
                        data-ripple-light="true"
                    >
                        Beregn
                    </button>
                </div>

                <div id="resultCards"></div>

                <section
                    class="mt-3 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm"
                >
                    <div class="flex items-center justify-between">
                        <h2 class="text-base font-semibold text-emerald-600">
                            Overskud
                        </h2>
                        <span
                            id="totalForbrug"
                            class="font-semibold tabular-nums text-emerald-600 text-lg"
                            >—</span
                        >
                    </div>
                </section>

                <button
                    id="downloadButton"
                    class="hidden middle none center mt-6 h-11 w-full rounded-lg border border-slate-200 bg-white px-6 font-sans text-sm font-medium text-slate-700 shadow-sm transition-all hover:bg-slate-50 focus:opacity-90 active:opacity-90"
                    data-ripple-dark="true"
                >
                    Hent som billede
                </button>
            </section>

            <section id="configView" class="hidden">
                <div
                    class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm"
                >
                <h3
                    class="mb-1 text-xs font-semibold uppercase tracking-wide text-slate-400"
                >
                    Personer
                </h3>
                <div id="peopleList" class="text-sm"></div>

                <button
                    id="peopleAddButton"
                    type="button"
                    class="mt-2 inline-flex h-9 items-center gap-1 rounded-md border border-dashed border-slate-300 bg-white px-3 text-xs font-medium text-slate-600 transition hover:border-slate-400 hover:text-slate-800"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Tilføj person
                </button>

                <h3
                    class="mb-1 mt-4 text-xs font-semibold uppercase tracking-wide text-slate-400"
                >
                    Kategorier
                </h3>
                <div id="configList" class="text-sm"></div>

                <button
                    id="configAddButton"
                    type="button"
                    class="mt-2 inline-flex h-9 items-center gap-1 rounded-md border border-dashed border-slate-300 bg-white px-3 text-xs font-medium text-slate-600 transition hover:border-slate-400 hover:text-slate-800"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Tilføj kategori
                </button>

                <button
                    id="configSaveButton"
                    type="button"
                    class="mt-4 h-10 w-full rounded-lg bg-slate-900 px-4 text-sm font-semibold text-white transition hover:bg-slate-800"
                >
                    Gem
                </button>
                </div>

                <div
                    class="mt-4 rounded-2xl border border-slate-200 bg-white p-5 text-center shadow-sm"
                >
                    <p
                        id="authStatus"
                        class="break-all text-sm text-slate-600"
                    >
                        Ikke logget ind
                    </p>
                    <div
                        class="mt-3 flex flex-wrap justify-center gap-2"
                    >
                        <button
                            id="signInButton"
                            type="button"
                            class="h-9 rounded-md border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
                        >
                            Log ind
                        </button>
                        <button
                            id="signOutButton"
                            type="button"
                            class="hidden h-9 rounded-md border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
                        >
                            Log ud
                        </button>
                        <button
                            id="deleteAccountButton"
                            type="button"
                            class="hidden h-9 rounded-md border border-rose-200 bg-white px-4 text-sm font-medium text-rose-600 transition hover:bg-rose-50"
                        >
                            Slet konto
                        </button>
                        <button
                            id="deleteLocalButton"
                            type="button"
                            class="hidden h-9 rounded-md border border-rose-200 bg-white px-4 text-sm font-medium text-rose-600 transition hover:bg-rose-50"
                        >
                            Slet lokal data
                        </button>
                    </div>
                    <p class="mt-4 text-[10px] text-slate-300">
                        Vibed with ❤️
                    </p>
                </div>
            </section>
        </main>

        <script>
            if ("serviceWorker" in navigator) {
                const wasControlled = !!navigator.serviceWorker.controller;
                let refreshing = false;
                navigator.serviceWorker.addEventListener(
                    "controllerchange",
                    () => {
                        if (!wasControlled || refreshing) return;
                        refreshing = true;
                        window.location.reload();
                    },
                );
                navigator.serviceWorker
                    .register("/budget/sw.js")
                    .then((registration) =>
                        console.log(
                            "Service Worker registered with scope:",
                            registration.scope,
                        ),
                    )
                    .catch((error) =>
                        console.error(
                            "Service Worker registration failed:",
                            error,
                        ),
                    );
            }
        </script>
    </body>
</html>
